name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install -D @types/node
      - run: npm ci
      - run: npm run build
      - run: git add package.json package-lock.json tsconfig*.json
      - run: git commit -m "Fix TypeScript build configuration"
      - run: git push
      - run: npm ci
      - run: npm run build
      - run: git add package.json package-lock.json
      - run: git commit -m "Regenerate package lock"
      - run: git push
      - run: npm ci

      - run: npm run build
      - run: npx gh-pages -d dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
